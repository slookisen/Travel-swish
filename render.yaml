services:
  - type: web
    name: travel-swish-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Required for live web recs via Brave
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      # Optional: preferred provider for structured place recommendations.
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      # CORS: allow your GitHub Pages origin(s). Comma-separated.
      - key: TS_CORS_ORIGINS
        value: https://slookisen.github.io

      # Auth-lite / abuse guard (optional but recommended for public deploys)
      - key: TS_API_KEY
        sync: false
      - key: TS_AUTH_MODE
        value: origin_or_key
      - key: TS_API_RL_WINDOW_S
        value: "60"
      - key: TS_API_RL_MAX_COST
        value: "120"
