<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0d1a" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Best-effort caching hints (GitHub Pages may ignore/override these). -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Travel-Swish</title>
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #0a0d1a; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    </style>

    <!-- SPA redirect: pick up route from 404.html ?p= param and restore history -->
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          // Replace the ?p= URL with the real SPA route (no reload)
          window.history.replaceState(null, '', window.location.pathname + decodeURIComponent(p));
        }
      })();
    </script>

    <!-- Cache-bust guard (must run before the main module script). -->
    <script>
      (function () {
        // GitHub Pages caches index.html (often ~10 minutes). If a user has an old
        // cached index.html that points at deleted hashed assets, the main module
        // can 404 => blank screen. We listen for resource load failures and force
        // a cache-busted reload (?v=...).

        var bootKey = 'ts_boot_reload_once';

        function reloadCacheBusted() {
          try {
            var u = new URL(window.location.href);
            if (!u.searchParams.has('v')) {
              u.searchParams.set('v', String(Date.now()));
              window.location.replace(u.toString());
              return;
            }
          } catch (e) {}

          // If we already tried with ?v=, reload only once more (avoid loops offline).
          try {
            if (!sessionStorage.getItem(bootKey)) {
              sessionStorage.setItem(bootKey, '1');
              window.location.reload();
            }
          } catch (e) {
            window.location.reload();
          }
        }

        // Capture resource errors (script/link). Resource errors don't bubble.
        window.addEventListener(
          'error',
          function (ev) {
            try {
              var t = ev && ev.target;
              if (t && t.tagName === 'SCRIPT' && t.src && String(t.src).indexOf('/assets/') !== -1) {
                reloadCacheBusted();
              }
            } catch (e) {}
          },
          true,
        );

        // Catch failed dynamic imports (chunks) after initial boot.
        window.addEventListener(
          'unhandledrejection',
          function (ev) {
            try {
              var r = ev && ev.reason;
              var msg = String((r && r.message) || r || '');
              if (
                msg.indexOf('Failed to fetch dynamically imported module') !== -1 ||
                msg.indexOf('Importing a module script failed') !== -1
              ) {
                reloadCacheBusted();
              }
            } catch (e) {}
          },
          true,
        );
      })();
    </script>

    <script type="module" crossorigin src="/Travel-swish/assets/index-DGB-9Myp.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <!--
      If a user has an old cached index.html that points at now-deleted hashed assets,
      the main module can 404 => blank screen. We force a cache-busted reload.
    -->
  </body>
</html>
