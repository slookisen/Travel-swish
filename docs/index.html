<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0d1a" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Best-effort caching hints (GitHub Pages may ignore/override these). -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Travel-Swish</title>
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #0a0d1a; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    </style>

    <!-- SPA redirect: pick up route from 404.html ?p= param and restore history -->
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          // Replace the ?p= URL with the real SPA route (no reload)
          window.history.replaceState(null, '', window.location.pathname + decodeURIComponent(p));
        }
      })();
    </script>
    <script type="module" crossorigin src="/Travel-swish/assets/index-DtA4EjsJ.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <!--
      If a user has an old cached index.html that points at now-deleted hashed assets,
      the main module can 404 => blank screen. We force a cache-busted reload.
    -->
  </body>
</html>
